services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "${REDIS_PORT}:6379"

  celery_worker: 
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app
    command: >
      sh -c "pip install uv && uv run celery -A app.worker worker --loglevel=info"
    environment:
      - PYTHONPATH=/app
    env_file:
      - .env
    depends_on:
      - redis
  
  flower:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app
    command: >
      sh -c "pip install uv && uv run celery -A app.worker flower --port=5555"
    ports:
      - "5555:5555"
    environment:
      - PYTHONPATH=/app
    env_file:
      - .env
    depends_on:
      - redis

volumes:
  postgres_data: